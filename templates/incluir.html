<!DOCTYPE html>
<!DOCTYPE html>
<html lang="pt-br">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>OzzBank — Incluir Contrato</title>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
        <style>
            :root{--gold:#d4af37;--gold-glow:linear-gradient(90deg,#ffdf80,#d4af37,#ffd24d)}
            html,body{height:100%;margin:0}
            body{font-family:'Montserrat',system-ui,Arial;background:#000;color:#fff;display:flex;flex-direction:column}
            .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.04)}
            .ozz{font-family:'Playfair Display',serif;font-size:28px;background:var(--gold-glow);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 10px rgba(212,175,55,0.5)}
            .container{max-width:720px;margin:36px auto;padding:28px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03)}
            label{color:rgba(255,255,255,0.85);font-weight:600}
            input,select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#fff}
            .hint{color:rgba(255,255,255,0.7);font-size:13px}
            .btn{display:inline-block;padding:12px 16px;border-radius:10px;font-weight:700;text-decoration:none}
            .btn.primary{background:var(--gold);color:#000;border:none}
            .flash{margin-bottom:12px;padding:10px;border-radius:8px}
        </style>
        <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
    <header class="topbar">
        <div class="ozz">OzzBank</div>
    </header>
    <main>
        <div class="container">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div>
                    {% for category,msg in messages %}
                        <div class="flash" style="background:{{ 'rgba(34,197,94,0.12)' if category=='success' else 'rgba(239,68,68,0.08)' }};color:{{ '#16a34a' if category=='success' else '#b91c1c' }}">{{ msg }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% endwith %}

            <h2 style="font-family:'Playfair Display',serif;font-size:26px;margin:6px 0 14px">Novo Contrato Bancário</h2>

            <form action="/incluir" method="POST" class="space-y-4">
                {% if numero_preview %}
                <div style="margin-bottom:12px">
                    <label>Número do Contrato</label>
                    <input type="text" name="numero_display" value="{{ numero_preview }}" disabled>
                    <input type="hidden" name="numero" value="{{ numero_preview }}">
                </div>
                {% endif %}

                <div style="margin-bottom:12px">
                    <label>Nome do Cliente</label>
                    <input type="text" name="cliente" required>
                </div>

                <div style="margin-bottom:12px">
                    <label>CPF do Cliente</label>
                    <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00" inputmode="numeric" maxlength="14" autocomplete="off">
                </div>

                <div style="margin-bottom:12px">
                    <label>Valor (R$)</label>
                    <input type="text" id="valor" name="valor" required placeholder="R$ 0,00" inputmode="decimal" autocomplete="off">
                </div>

                <div style="margin-bottom:16px">
                    <label>Data de Assinatura</label>
                    <input type="date" name="data" required>
                </div>

                <div style="text-align:right;display:flex;gap:10px;justify-content:flex-end;align-items:center">
                    <a href="/" class="btn" style="background:transparent;border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.9);padding:10px 14px;border-radius:8px;text-decoration:none">Cancelar</a>
                    <button type="submit" class="btn primary">Cadastrar Contrato</button>
                </div>
            </form>
        </div>
    </main>
    <script>
        (function () {
            const cpfInput = document.getElementById('cpf');
            const valorInput = document.getElementById('valor');

            function maskCPF(value) {
                const digits = value.replace(/\D/g, '').slice(0, 11);
                if (digits.length <= 3) return digits;
                if (digits.length <= 6) return digits.slice(0, 3) + '.' + digits.slice(3);
                if (digits.length <= 9) return digits.slice(0, 3) + '.' + digits.slice(3, 6) + '.' + digits.slice(6);
                return digits.slice(0, 3) + '.' + digits.slice(3, 6) + '.' + digits.slice(6, 9) + '-' + digits.slice(9);
            }

            function maskBRL(value) {
                const digits = value.replace(/\D/g, '');
                if (!digits) return '';
                const cents = (parseInt(digits, 10) / 100).toFixed(2);
                const parts = cents.split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                return 'R$ ' + parts[0] + ',' + parts[1];
            }

            if (cpfInput) {
                cpfInput.addEventListener('input', function () {
                    cpfInput.value = maskCPF(cpfInput.value);
                });
            }

            if (valorInput) {
                valorInput.addEventListener('input', function () {
                    valorInput.value = maskBRL(valorInput.value);
                });
            }
        })();
    </script>
</body>
</html>
