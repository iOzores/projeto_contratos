<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Contratos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 p-10 relative">
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
        <svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 64 64" fill="none" style="opacity:0.06; transform: rotate(-15deg);">
            <rect x="6" y="10" width="40" height="36" rx="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
            <path d="M12 16h32" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
            <path d="M12 22h28" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
            <path d="M12 28h28" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
            <path d="M42 34c0 0 6 2 8 6 1.2 2.4.8 4-1 5-1.8 1-6 1-8-1-2-2-6-6-6-6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" />
            <path d="M44 36c2-1 6-2 8 2" stroke="#1e40af" stroke-width="1.8" stroke-linecap="round" />
            <path d="M46 38c-2 2-6 4-9 4" stroke="#1e40af" stroke-width="1.8" stroke-linecap="round" />
            <path d="M34 40c4 2 6 4 10 4" stroke="#1e40af" stroke-width="1.6" stroke-linecap="round" />
            <path d="M50 44c1 1 1 2 0 3-1 1-3 1-4 0s-1-2 0-3c1-1 3-1 4 0z" fill="#1e40af" />
            <path d="M48 46l6-8" stroke="#0f172a" stroke-width="1.2" stroke-linecap="round" />
            <circle cx="54" cy="42" r="1.5" fill="#0f172a" />
        </svg>
    </div>

    <header class="max-w-3xl mx-auto mb-8 text-center relative z-10">
        <div class="inline-flex items-center justify-center gap-4">
            <!-- Ícone: mão assinando contrato -->
            <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 64 64" fill="none" class="text-blue-600">
                <rect x="6" y="10" width="40" height="36" rx="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
                <path d="M12 16h32" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
                <path d="M12 22h28" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
                <path d="M12 28h28" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
                <path d="M42 34c0 0 6 2 8 6 1.2 2.4.8 4-1 5-1.8 1-6 1-8-1-2-2-6-6-6-6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" />
                <path d="M44 36c2-1 6-2 8 2" stroke="#1e40af" stroke-width="1.8" stroke-linecap="round" />
                <path d="M46 38c-2 2-6 4-9 4" stroke="#1e40af" stroke-width="1.8" stroke-linecap="round" />
                <path d="M34 40c4 2 6 4 10 4" stroke="#1e40af" stroke-width="1.6" stroke-linecap="round" />
                <path d="M50 44c1 1 1 2 0 3-1 1-3 1-4 0s-1-2 0-3c1-1 3-1 4 0z" fill="#1e40af" />
                <path d="M48 46l6-8" stroke="#0f172a" stroke-width="1.2" stroke-linecap="round" />
                <circle cx="54" cy="42" r="1.5" fill="#0f172a" />
            </svg>

            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900">Gestão de Contratos</h1>
        </div>
        <p class="mt-3 text-gray-600">Painel para cadastro e controle de contratos</p>
    </header>

    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md relative z-10">
        <h2 class="text-2xl font-semibold mb-6 text-gray-800">Novo Contrato Bancário</h2>
        
        <form action="/incluir" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Número do Contrato</label>
                <input type="text" name="numero" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome do Cliente</label>
                <input type="text" name="cliente" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Valor (R$)</label>
                <input type="number" step="0.01" name="valor" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Data de Assinatura</label>
                <input type="date" name="data" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition">
                Cadastrar Contrato
            </button>
        </form>
    </div>
</body>
</html>
